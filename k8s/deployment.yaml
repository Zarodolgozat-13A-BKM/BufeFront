apiVersion: apps/v1
kind: Deployment
metadata:
  name: bufefrontend
  labels:
    app: bufefrontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bufefrontend
  template:
    metadata:
      labels:
        app: bufefrontend
    spec:
      containers:
        - name: bufefrontend
          image: ghcr.io/OWNER/REPO:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
