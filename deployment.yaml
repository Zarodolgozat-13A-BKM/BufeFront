apiVersion: apps/v1
kind: Deployment
metadata:
  name: vizgaremek-bufe-frontend-deployment
spec:
  selector:
    matchLabels:
      app: bufe-frontend
  template:
    metadata:
      labels:
        app: bufe-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-login-secret
      containers:
        - name: bufe-frontend
          image: ghcr.io/zarodolgozat-13a-bkm/zarodolgozat-bufe-frontend
          imagePullPolicy: Always

          env:
            - name: API_URL
              value: "https://bufeapi.jcloud.jedlik.cloud/api"
            - name: WEB_SOCKET_URL
              value: "ws://bufeapi-ws.jcloud.jedlik.cloud/ws"
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: bufe-frontend-cluster-ip-service
spec:
  selector:
    app: bufe-frontend
  type: ClusterIP
  ports:
    - protocol: TCP
      targetPort: 80
      port: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bufe-frontend-ingress
spec:
  ingressClassName: nginx

  rules:
    - host: bufe.jcloud.jedlik.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bufe-frontend-cluster-ip-service
                port:
                  number: 80
---
